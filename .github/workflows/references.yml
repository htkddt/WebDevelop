name: Build references

on:
  push:
    branches: [main, master]
    tags: ['v*']
    paths: ['references/**', '.github/workflows/references.yml']

jobs:
  build:
    runs-on: ubuntu-latest

    # Matrix: Test trên nhiều version Node.js
    # strategy:
    #   matrix:
    #     node-version: [18.x, 20.x, 22.x, 24.x]
    #   fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          # node-version: ${{ matrix.node-version }}
          node-version: 20
          cache: 'npm'
          cache-dependency-path: references/fe/package-lock.json

      - name: Install dependencies
        run: cd references/fe && npm ci

      - name: Build
        run: cd references/fe && npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: references-build
          path: references/fe/dist/*

