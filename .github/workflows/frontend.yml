name: Build Frontend

on:
  push:
    branches: [main, master]
    tags: ['v*']
    paths: ['frontend/**', 'backend/**', '.github/workflows/frontend.yml']
  # pull_request:
  #   paths: ['frontend/**', 'backend/**', '.github/workflows/frontend.yml']

permissions: 
  contents: read

concurrency: 
  group: frontend-${{ github.ref }} 
  cancel-in-progress: true

jobs:
  build:
    # strategy:
    #   fail-fast: false
    #   matrix:
    #     include:
    #       - os: ubuntu-latest
    #         label: linux-amd64
    #       - os: ubuntu-24.04-arm
    #         label: linux-arm64
    #       - os: macos-14
    #         label: darwin-arm64
    # runs-on: ${{ matrix.os }}

    # 🔥 Chỉ chạy khi push branch (git push origin <branch_name>)
    # if: github.ref_type == 'branch'

    # Nếu không set default thì cần cd frontend kèm với các comment setup environment (cd frontend && npm ci)
    # defaults:
    #   run:
    #     working-directory: frontend

    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 14
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Build
        run: cd frontend && npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build-${{ github.run_id }}
          path: frontend/dist/*
          retention-days: 30
# =============================== AUTO CREATE BETA TAG ===============================
  auto-tag:
    needs: build
    runs-on: ubuntu-latest

    # 🔥 Chỉ chạy khi push branch
    # if: github.ref_type == 'branch' && github.event_name == 'push'

    permissions:
      contents: write

    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      created: ${{ steps.tag.outputs.created }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Create or Increment Beta Tag
        id: tag
        run: |
          echo "🔍 Detecting version..."
          git fetch --tags

          # 🔥 Nếu dev push tag v1.1.0 → convert thành beta
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            BASE="${GITHUB_REF#refs/tags/v}"
            echo "→ Push tag detected: v${BASE} → will create beta"
          else
            # Lấy tag gần nhất
            LAST=$(git tag -l "v*" | sort -V | tail -1)
            echo "→ Push branch detected → finding latest beta tag"
            if [[ -z "$LAST" ]]; then
              BASE="1.0.0"
            else
              BASE="${LAST#v}"
            fi
          fi

          # 🔥 Strip beta nếu có
          if [[ "$BASE" == *-beta.* ]]; then
            PREFIX="${BASE%-beta.*}"
          else
            PREFIX="$BASE"
          fi

          PREFIX="${PREFIX}-beta"

          # 🔥 Tìm số beta lớn nhất
          HIGHEST=$(git tag -l "v${PREFIX}.*" | sed "s/^v${PREFIX}\.//" | sort -n | tail -1)

          if [[ -z "$HIGHEST" ]]; then
            NEXT=1
          else
            NEXT=$((HIGHEST + 1))
          fi

          TAG="v${PREFIX}.${NEXT}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag "$TAG"
          git push origin "$TAG"

          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "created=true" >> $GITHUB_OUTPUT
# =============================== CREATE RELEASE ===============================
  release:
    needs: [build, auto-tag]
    runs-on: ubuntu-latest

    # 🔥 Chỉ chạy khi push tag (git push origin <tag_name>)
    # if: github.ref_type == 'tag'

    # 🔥 Chạy khi:
    # git push origin <tag_name>
    # auto-tag done
    if: startsWith(github.ref, 'refs/tags/v') || needs.auto-tag.outputs.created == 'true'

    permissions:
      contents: write

    # Không cần set default và không cần kèm cd frontend command vì release work trên artifact được tạo ra từ job build
    # defaults:
    #   run:
    #     working-directory: frontend

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: frontend-build-${{ github.run_id }}
          merge-multiple: true

      - name: Resolve tag
        id: tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="${{ needs.auto-tag.outputs.tag }}"
          fi

          VER="${TAG#v}"

          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VER" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: dist/**

          # 🔥 Beta nếu có dấu "-"
          prerelease: ${{ contains(steps.tag.outputs.version, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}