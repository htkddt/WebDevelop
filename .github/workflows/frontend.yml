name: Build Frontend

on:
  push:
    branches: [main, master]
    paths:
      - 'frontend/**'
    tags:
      - 'v*'
  pull_request:
    paths:
      - 'frontend/**'

jobs:
  build:
    runs-on: ubuntu-latest

    # 🔥 Chỉ chạy khi push branch (git push origin <branch_name>)
    if: github.ref_type == 'branch'

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 14
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist

  release:
    runs-on: ubuntu-latest

    # 🔥 Chỉ chạy khi push tag (git push origin <tag_name>)
    if: github.ref_type == 'tag'

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Cần để lấy tag

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 14
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Generate version
        id: version
        shell: bash
        run: |
          echo "🔍 Detecting version..."

          # Nếu commit có tag
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
            echo "✅ Found tag: $VERSION"
          else
            # Lấy tag gần nhất
            LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

            if [[ -z "$LAST_TAG" ]]; then
              VERSION="0.1.0-beta.1"
              echo "⚠️ No tag found → $VERSION"
            else
              BASE="${LAST_TAG#v}"

              if [[ "$BASE" == *-beta.* ]]; then
                PREFIX="${BASE%-beta.*}"
                NUM="${BASE##*-beta.}"
                NEXT=$((NUM + 1))
                VERSION="${PREFIX}-beta.${NEXT}"
              else
                VERSION="${BASE}-beta.1"
              fi

              echo "📦 From last tag $LAST_TAG → $VERSION"
            fi
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-release-${{ steps.version.outputs.version }}
          path: frontend/dist